name: tactile
description: >-
  Make any widget feel physical: it tilts toward your finger, depresses at the
  press point, and a glare tracks where you press. Compositor-only, no shaders.
version: 0.2.0
repository: https://github.com/ananmouaz/tactile
issue_tracker: https://github.com/ananmouaz/tactile/issues

topics:
  - ui
  - animation
  - gestures
  - button
  - interaction

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
